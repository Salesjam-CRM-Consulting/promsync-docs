<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav>
        <a href="{{ '/help/' | relative_url }}">User guide</a>
        <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
        <a href="{{ '/terms/' | relative_url }}">Terms</a>
      </nav>
    </div>
  </header>
  <main class="wrap content">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="wrap">
      <p>© Salesjam · <a href="{{ '/privacy/' | relative_url }}">Privacy</a> · <a href="{{ '/terms/' | relative_url }}">Terms</a></p>
    </div>
  </footer>
</body>
</html>
